<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalimatku - Belajar CFG</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="game-header">
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            <div class="stats">
                <span id="lives">❤️❤️❤️</span>
                <span id="score">⭐ 0</span>
            </div>
        </header>

        <main class="game-area">
            <h2>Susun menjadi kalimat yang efektif!</h2>
            
            <div class="scrambled-words" id="soal-container">
                </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ketik jawabanmu di sini..." autocomplete="off">
            </div>
        </main>

        <footer class="game-footer">
            <div id="feedback-panel" class="feedback-panel hidden">
                <h3 id="feedback-title">Benar!</h3>
                <p id="feedback-desc">Pola: S-P-O</p>
            </div>
            <button id="btn-check" class="btn primary">PERIKSA</button>
        </footer>
    </div>

    <script src="assets/js/dictionary.js"></script>
    <script src="assets/js/engine.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
