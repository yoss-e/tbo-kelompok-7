<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalimatku - Belajar Kalimat Efektif</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="top-nav">
        <div class="nav-container">
            <div class="nav-left">
                <button class="btn-close material-symbols-outlined">close</button>
                <div class="progress-container">
                    <div id="progress-bar" class="progress-fill"></div>
                </div>
            </div>
            <div class="nav-right">
                <div class="stat-item">
                    <span class="material-symbols-outlined icon-heart">favorite</span>
                    <span id="lives-display">3</span>
                </div>
                <div class="stat-item">
                    <span class="material-symbols-outlined icon-fire">local_fire_department</span>
                    <span id="score-display">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="main-area">
        <h1 class="question-title">Ubah kalimat berikut menjadi kalimat efektif:</h1>
        
        <div class="prompt-card">
            <div class="badge-asal">KALIMAT ASAL</div>
            <p id="teks-soal" class="teks-soal">"..."</p>
            <div class="badge-status">Tidak Efektif</div>
        </div>

        <div class="input-section">
            <label for="answer-input">JAWABAN ANDA</label>
            <textarea id="answer-input" placeholder="Tulis kalimat efektif di sini..."></textarea>
            <div class="input-footer">
                <span class="material-symbols-outlined">edit_note</span> Indonesian
            </div>
        </div>
    </main>

    <div id="feedback-drawer" class="feedback-drawer">
        <div class="drawer-container">
            <div class="feedback-info">
                <div id="feedback-icon-bg" class="icon-bg">
                    <span id="feedback-icon" class="material-symbols-outlined">check</span>
                </div>
                <div class="feedback-text">
                    <h3 id="feedback-title">Luar Biasa!</h3>
                    <p id="feedback-desc">Pola: S-P-O</p>
                </div>
            </div>
            <button id="btn-next" class="btn-action">LANJUT</button>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="bottom-container">
            <button id="btn-check" class="btn-primary">PERIKSA</button>
        </div>
    </div>

    <script src="assets/js/dictionary.js"></script>
    <script src="assets/js/engine.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
